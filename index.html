<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Clusters para kohonen 3x3</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0e1116;
    --panel: #161b22;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --land-other: #2a313c;
    --ocean: #0b0d12;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; }
  .app { display: grid; grid-template-columns: 1fr 520px; height: 100vh; }
  .map { position: relative; background: var(--ocean); }
  .map svg { width: 100%; height: 100%; display: block; }
  .country { stroke: #0b0d12; stroke-width: 0.6; transition: filter .15s ease; }
  .country.dim { fill: var(--land-other); }
  .country:hover { filter: brightness(1.25); }
  .country:not(.dim) { cursor: pointer; }
  .country.selected { stroke: #fff; stroke-width: 1.4; filter: brightness(1.3); }
  .label { fill: #e6edf3; font-size: 11px; font-weight: 600; pointer-events: none; text-shadow: 0 0 4px #000, 0 0 4px #000; }
  .sidebar { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 20px 22px; }
  .sidebar h1 { font-size: 16px; margin: 0 0 4px 0; }
  .sidebar .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  .cluster { margin-bottom: 14px; padding: 10px 12px; background: #0e1116; border: 1px solid var(--border); border-radius: 6px; transition: border-color .25s ease, box-shadow .25s ease, background .25s ease; }
  .cluster:not(:has(em)):hover { border-color: #3a4451; cursor: pointer; }
  .cluster.highlight { border-color: #1f6feb; box-shadow: 0 0 0 2px rgba(31,111,235,0.35); background: #101a2c; }
  .cluster-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .swatch { width: 18px; height: 18px; min-width: 18px; min-height: 18px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(255,255,255,0.15); display: inline-block; }
  .cluster-title { font-weight: 600; font-size: 13px; }
  .cluster-count { color: var(--muted); font-size: 12px; margin-left: auto; }
  .country-list { font-size: 12px; color: var(--text); line-height: 1.55; }
  .country-list .dist { color: var(--muted); font-variant-numeric: tabular-nums; }
  .footer { color: var(--muted); font-size: 11px; margin-top: 16px; line-height: 1.5; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
  .toolbar button {
    flex: 1; background: #0e1116; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 10px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .toolbar button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .toolbar button:hover:not(.active) { background: #161b22; }
  .country-row { display: flex; flex-direction: column; padding: 4px 0; border-bottom: 1px solid #1a1f27; }
  .country-row:last-child { border-bottom: none; }
  .country-row .name { font-weight: 600; font-size: 12px; }
  .country-row .stats {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 2px 12px; font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums; margin-top: 2px;
  }
  .country-row .stats span b { color: var(--text); font-weight: 500; }
  .cluster-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10.5px;
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
    table-layout: auto;
  }
  .cluster-table th, .cluster-table td {
    padding: 3px 4px;
    border-bottom: 1px solid #1a1f27;
    text-align: right;
    white-space: nowrap;
  }
  .cluster-table th {
    font-weight: 500;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
  }
  .cluster-table th:first-child, .cluster-table td:first-child {
    text-align: left;
    font-weight: 600;
    color: var(--text);
  }
  .cluster-table tbody tr:hover { background: #1a1f27; }
  .cluster-table tbody tr:last-child td { border-bottom: none; }
  .cluster-table tr.mean-row td {
    border-top: 1px solid var(--border);
    background: #0b0d12;
    font-weight: 600;
    color: var(--text);
  }
  .cluster-table tr.mean-row td:first-child,
  .cluster-table tr.std-row td:first-child {
    font-style: italic;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 10px;
  }
  .cluster-table tr.std-row td {
    background: #0b0d12;
    color: var(--muted);
    font-weight: 500;
  }
  .tooltip {
    position: absolute; pointer-events: none; padding: 6px 10px;
    background: #0b0d12; border: 1px solid var(--border); border-radius: 4px;
    font-size: 12px; color: var(--text); opacity: 0; transition: opacity .1s;
    white-space: nowrap;
  }
  .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="map">
    <div class="loading" id="loading">Cargando mapa…</div>
    <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="tooltip" id="tt"></div>
  </div>
  <aside class="sidebar">
    <h1>Clusters para kohonen 3x3</h1>
    <div class="subtitle">Asignación de países por neurona en la grilla 3×3</div>
    <div class="toolbar">
      <button id="btn-compact" class="active">Compacto</button>
      <button id="btn-detail">Detallado</button>
    </div>
    <div id="legend"></div>
    <div class="footer">
      Países en gris: no formaron parte del dataset (28 países). Una neurona quedó muerta (sin países asignados).
    </div>
  </aside>
</div>

<script>
const clusters = [
  { id: "(0,0)", label: "híbridos atlánticos",          color: "#3d8bfd", countries: ["Ireland", "Spain"] },
  { id: "(0,1)", label: "núcleo rico",                  color: "#06d6a0", countries: ["Denmark", "Luxembourg", "Netherlands", "Switzerland"] },
  { id: "(0,2)", label: "este \"estándar\"",            color: "#ef476f", countries: ["Hungary", "Latvia", "Lithuania", "Slovakia", "Ukraine"] },
  { id: "(1,0)", label: "intermedios grandes",          color: "#f2cc8f", countries: ["Finland", "Italy", "United Kingdom"] },
  { id: "(1,1)", label: "norte industrial",             color: "#c77dff", countries: ["Germany", "Norway", "Sweden"] },
  { id: "(1,2)", label: "muerta",                       color: "#444b56", countries: [] },
  { id: "(2,0)", label: "sur/este pobre",               color: "#e07a5f", countries: ["Bulgaria", "Croatia", "Estonia", "Greece", "Poland", "Portugal"] },
  { id: "(2,1)", label: "pequeños occidentales",        color: "#81b29a", countries: ["Austria", "Belgium", "Iceland"] },
  { id: "(2,2)", label: "post-comunistas en transición", color: "#ffb703", countries: ["Czech Republic", "Slovenia"] }
];

// alias para reconciliar nombres del GeoJSON
const aliases = {
  "Czech Republic": ["Czech Republic", "Czechia"],
  "United Kingdom": ["United Kingdom", "UK", "Great Britain"],
};

const countryToCluster = {};
clusters.forEach(c => c.countries.forEach(name => {
  const keys = aliases[name] || [name];
  keys.forEach(k => countryToCluster[k] = c);
}));

// datos de europe.csv embebidos para modo detallado
const countryData = {
  "Austria":        { Area:  83871, GDP: 41600, Inflation: 3.5, "Life.expect": 79.91, Military: 0.8,  "Pop.growth":  0.03, Unemployment:  4.2 },
  "Belgium":        { Area:  30528, GDP: 37800, Inflation: 3.5, "Life.expect": 79.65, Military: 1.3,  "Pop.growth":  0.06, Unemployment:  7.2 },
  "Bulgaria":       { Area: 110879, GDP: 13800, Inflation: 4.2, "Life.expect": 73.84, Military: 2.6,  "Pop.growth": -0.80, Unemployment:  9.6 },
  "Croatia":        { Area:  56594, GDP: 18000, Inflation: 2.3, "Life.expect": 75.99, Military: 2.39, "Pop.growth": -0.09, Unemployment: 17.7 },
  "Czech Republic": { Area:  78867, GDP: 27100, Inflation: 1.9, "Life.expect": 77.38, Military: 1.15, "Pop.growth": -0.13, Unemployment:  8.5 },
  "Denmark":        { Area:  43094, GDP: 37000, Inflation: 2.8, "Life.expect": 78.78, Military: 1.3,  "Pop.growth":  0.24, Unemployment:  6.1 },
  "Estonia":        { Area:  45228, GDP: 20400, Inflation: 5.0, "Life.expect": 73.58, Military: 2.0,  "Pop.growth": -0.65, Unemployment: 12.5 },
  "Finland":        { Area: 338145, GDP: 36000, Inflation: 3.3, "Life.expect": 79.41, Military: 2.0,  "Pop.growth":  0.07, Unemployment:  7.8 },
  "Germany":        { Area: 357022, GDP: 38100, Inflation: 2.5, "Life.expect": 80.19, Military: 1.5,  "Pop.growth": -0.20, Unemployment:  6.0 },
  "Greece":         { Area: 131957, GDP: 26300, Inflation: 3.3, "Life.expect": 80.05, Military: 4.3,  "Pop.growth":  0.06, Unemployment: 17.4 },
  "Hungary":        { Area:  93028, GDP: 19600, Inflation: 3.9, "Life.expect": 75.02, Military: 1.75, "Pop.growth": -0.18, Unemployment: 10.9 },
  "Iceland":        { Area: 103000, GDP: 38100, Inflation: 4.0, "Life.expect": 81.00, Military: 0.0,  "Pop.growth":  0.67, Unemployment:  7.4 },
  "Ireland":        { Area:  70273, GDP: 40800, Inflation: 2.6, "Life.expect": 80.32, Military: 0.9,  "Pop.growth":  1.11, Unemployment: 14.4 },
  "Italy":          { Area: 301340, GDP: 30500, Inflation: 2.9, "Life.expect": 81.86, Military: 1.8,  "Pop.growth":  0.38, Unemployment:  8.4 },
  "Latvia":         { Area:  64589, GDP: 16800, Inflation: 4.4, "Life.expect": 72.93, Military: 1.1,  "Pop.growth": -0.60, Unemployment: 12.8 },
  "Lithuania":      { Area:  65300, GDP: 19100, Inflation: 4.1, "Life.expect": 75.55, Military: 0.9,  "Pop.growth": -0.28, Unemployment: 15.4 },
  "Luxembourg":     { Area:   2586, GDP: 80600, Inflation: 3.4, "Life.expect": 79.75, Military: 0.9,  "Pop.growth":  1.14, Unemployment:  5.7 },
  "Netherlands":    { Area:  41543, GDP: 42000, Inflation: 2.3, "Life.expect": 80.91, Military: 1.6,  "Pop.growth":  0.45, Unemployment:  4.4 },
  "Norway":         { Area: 323802, GDP: 53400, Inflation: 1.3, "Life.expect": 80.32, Military: 1.9,  "Pop.growth":  0.33, Unemployment:  3.3 },
  "Poland":         { Area: 312685, GDP: 20200, Inflation: 4.2, "Life.expect": 76.25, Military: 1.9,  "Pop.growth": -0.08, Unemployment: 12.4 },
  "Portugal":       { Area:  92090, GDP: 23400, Inflation: 3.7, "Life.expect": 78.70, Military: 2.3,  "Pop.growth":  0.18, Unemployment: 12.7 },
  "Slovakia":       { Area:  49035, GDP: 23300, Inflation: 3.9, "Life.expect": 76.03, Military: 1.08, "Pop.growth":  0.10, Unemployment: 13.2 },
  "Slovenia":       { Area:  20273, GDP: 28800, Inflation: 1.8, "Life.expect": 77.48, Military: 1.7,  "Pop.growth": -0.19, Unemployment: 11.8 },
  "Spain":          { Area: 505370, GDP: 30500, Inflation: 3.1, "Life.expect": 81.27, Military: 1.2,  "Pop.growth":  0.65, Unemployment: 21.7 },
  "Sweden":         { Area: 450295, GDP: 40700, Inflation: 3.0, "Life.expect": 81.18, Military: 1.5,  "Pop.growth":  0.17, Unemployment:  7.5 },
  "Switzerland":    { Area:  41277, GDP: 44500, Inflation: 0.2, "Life.expect": 81.17, Military: 1.0,  "Pop.growth":  0.92, Unemployment:  2.8 },
  "Ukraine":        { Area: 603550, GDP:  7200, Inflation: 8.0, "Life.expect": 68.74, Military: 1.4,  "Pop.growth": -0.63, Unemployment:  7.9 },
  "United Kingdom": { Area: 243610, GDP: 36500, Inflation: 4.5, "Life.expect": 80.17, Military: 2.7,  "Pop.growth":  0.55, Unemployment:  8.1 }
};

const fmt = (n) => {
  if (Math.abs(n) >= 10000) return Math.round(n).toLocaleString("en-US");
  if (Math.abs(n) >= 100)   return n.toLocaleString("en-US", { maximumFractionDigits: 1 });
  return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
};

function compactRow(name) {
  return `<div>${name}</div>`;
}

function detailTable(countries) {
  const VARS = ["Area", "GDP", "Inflation", "Life.expect", "Military", "Pop.growth", "Unemployment"];
  const present = countries.filter(c => countryData[c]);
  const rows = countries.map(name => {
    const d = countryData[name];
    if (!d) return `<tr><td>${name}</td><td colspan="7">—</td></tr>`;
    return `
      <tr>
        <td>${name}</td>
        <td>${fmt(d.Area)}</td>
        <td>${fmt(d.GDP)}</td>
        <td>${fmt(d.Inflation)}</td>
        <td>${fmt(d["Life.expect"])}</td>
        <td>${fmt(d.Military)}</td>
        <td>${fmt(d["Pop.growth"])}</td>
        <td>${fmt(d.Unemployment)}</td>
      </tr>
    `;
  }).join("");

  // filas de media y std del grupo
  let meanRow = "";
  let stdRow = "";
  if (present.length > 0) {
    const means = {};
    VARS.forEach(v => {
      means[v] = present.reduce((s, c) => s + countryData[c][v], 0) / present.length;
    });
    meanRow = `
      <tr class="mean-row">
        <td>media grupo</td>
        <td>${fmt(means.Area)}</td>
        <td>${fmt(means.GDP)}</td>
        <td>${fmt(means.Inflation)}</td>
        <td>${fmt(means["Life.expect"])}</td>
        <td>${fmt(means.Military)}</td>
        <td>${fmt(means["Pop.growth"])}</td>
        <td>${fmt(means.Unemployment)}</td>
      </tr>
    `;

    if (present.length >= 2) {
      const stds = {};
      VARS.forEach(v => {
        const sumSq = present.reduce((s, c) => s + Math.pow(countryData[c][v] - means[v], 2), 0);
        stds[v] = Math.sqrt(sumSq / (present.length - 1));
      });
      stdRow = `
        <tr class="std-row">
          <td>std grupo</td>
          <td>${fmt(stds.Area)}</td>
          <td>${fmt(stds.GDP)}</td>
          <td>${fmt(stds.Inflation)}</td>
          <td>${fmt(stds["Life.expect"])}</td>
          <td>${fmt(stds.Military)}</td>
          <td>${fmt(stds["Pop.growth"])}</td>
          <td>${fmt(stds.Unemployment)}</td>
        </tr>
      `;
    } else {
      stdRow = `<tr class="std-row"><td>std grupo</td><td colspan="7">— (n=1)</td></tr>`;
    }
  }

  return `
    <table class="cluster-table">
      <thead>
        <tr>
          <th>País</th>
          <th>Area</th>
          <th>GDP</th>
          <th>Infl</th>
          <th>Life</th>
          <th>Mil</th>
          <th>PopΔ</th>
          <th>Unemp</th>
        </tr>
      </thead>
      <tbody>${rows}${meanRow}${stdRow}</tbody>
    </table>
  `;
}

let viewMode = "compact";

function focusCluster(clusterId, countryName) {
  // resaltar tarjeta del cluster en la sidebar y scrollearla a la vista
  document.querySelectorAll(".cluster.highlight").forEach(el => el.classList.remove("highlight"));
  const target = document.querySelector(`.cluster[data-cluster-id="${clusterId}"]`);
  if (target) {
    target.classList.add("highlight");
    target.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
  // resaltar el pais clickeado y todos sus hermanos del cluster
  document.querySelectorAll(".country.selected").forEach(el => el.classList.remove("selected"));
  const cluster = clusters.find(c => c.id === clusterId);
  if (cluster) {
    cluster.countries.forEach(c => {
      const keys = aliases[c] || [c];
      keys.forEach(k => {
        document.querySelectorAll(`.country[data-country="${k}"]`).forEach(el => el.classList.add("selected"));
      });
    });
  }
}

function renderLegend() {
  const legendEl = document.getElementById("legend");
  legendEl.innerHTML = "";
  clusters.forEach(c => {
    const div = document.createElement("div");
    div.className = "cluster";
    div.dataset.clusterId = c.id;
    const isDead = c.countries.length === 0;
    let list;
    if (isDead) {
      list = `<div class="dist"><em>sin países asignados</em></div>`;
    } else if (viewMode === "compact") {
      list = c.countries.map(compactRow).join("");
    } else {
      list = detailTable(c.countries);
    }
    div.innerHTML = `
      <div class="cluster-header">
        <span class="swatch" style="background:${c.color}${isDead ? ';opacity:0.4' : ''}"></span>
        <span class="cluster-title">Neurona ${c.id}</span>
        <span class="cluster-count">${c.countries.length} país${c.countries.length===1?'':'es'}</span>
      </div>
      <div class="country-list">${list}</div>
    `;
    if (!isDead) {
      div.addEventListener("click", () => focusCluster(c.id));
    }
    legendEl.appendChild(div);
  });
}

document.getElementById("btn-compact").addEventListener("click", () => {
  viewMode = "compact";
  document.getElementById("btn-compact").classList.add("active");
  document.getElementById("btn-detail").classList.remove("active");
  renderLegend();
});
document.getElementById("btn-detail").addEventListener("click", () => {
  viewMode = "detail";
  document.getElementById("btn-detail").classList.add("active");
  document.getElementById("btn-compact").classList.remove("active");
  renderLegend();
});

renderLegend();

// Proyección equirectangular para Europa, con aspecto correcto
const LON_MIN = -25, LON_MAX = 45;
const LAT_MIN = 34, LAT_MAX = 72;
const LAT_MID = (LAT_MIN + LAT_MAX) / 2;
const K_LON = Math.cos(LAT_MID * Math.PI / 180);

// ancho/alto del bounding box en "grados ajustados"
const BBOX_W = (LON_MAX - LON_MIN) * K_LON;
const BBOX_H = (LAT_MAX - LAT_MIN);

// resolución de viewBox: 10 unidades por grado de latitud
const SCALE = 18;
const W = BBOX_W * SCALE;
const H = BBOX_H * SCALE;

const SVG = document.getElementById("map");
SVG.setAttribute("viewBox", `0 0 ${W} ${H}`);

function project([lon, lat]) {
  const x = (lon - LON_MIN) * K_LON * SCALE;
  const y = (LAT_MAX - lat) * SCALE;
  return [x, y];
}

function pathFromCoords(coords) {
  // coords es un anillo: [[lon,lat], ...]
  return coords.map((pt, i) => {
    const [x, y] = project(pt);
    return (i === 0 ? "M" : "L") + x.toFixed(2) + "," + y.toFixed(2);
  }).join(" ") + "Z";
}

function drawGeo(geojson) {
  document.getElementById("loading").remove();
  const tooltip = document.getElementById("tt");

  // centros para etiquetas
  const labels = [];

  geojson.features.forEach(feat => {
    const name = feat.properties.NAME || feat.properties.name || feat.properties.ADMIN;
    const cluster = countryToCluster[name];

    const geom = feat.geometry;
    let polygons = [];
    if (geom.type === "Polygon") polygons = [geom.coordinates];
    else if (geom.type === "MultiPolygon") polygons = geom.coordinates;

    polygons.forEach(poly => {
      // poly = [outer, hole1, hole2, ...]; usamos solo outer para simplificar
      const outer = poly[0];
      const d = pathFromCoords(outer);
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.setAttribute("class", "country" + (cluster ? "" : " dim"));
      if (cluster) path.setAttribute("fill", cluster.color);
      path.addEventListener("mousemove", (e) => {
        const rect = SVG.getBoundingClientRect();
        tooltip.style.left = (e.clientX - rect.left + 12) + "px";
        tooltip.style.top = (e.clientY - rect.top + 12) + "px";
        tooltip.style.opacity = 1;
        const cInfo = cluster ? ` — Neurona ${cluster.id}` : "";
        tooltip.textContent = name + cInfo;
      });
      path.addEventListener("mouseleave", () => { tooltip.style.opacity = 0; });
      if (cluster) {
        path.dataset.country = name;
        path.addEventListener("click", () => focusCluster(cluster.id, name));
      }
      SVG.appendChild(path);
    });

    // calcular centroide aproximado del polígono más grande para etiqueta
    if (cluster) {
      const biggest = polygons.reduce((a, b) => (a[0].length > b[0].length ? a : b))[0];
      let sx = 0, sy = 0;
      biggest.forEach(([lon, lat]) => { const [x, y] = project([lon, lat]); sx += x; sy += y; });
      const cx = sx / biggest.length, cy = sy / biggest.length;
      labels.push({ name, cx, cy });
    }
  });

  // dibujar etiquetas al final para que queden arriba
  labels.forEach(l => {
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", l.cx);
    t.setAttribute("y", l.cy);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("class", "label");
    t.textContent = l.name;
    SVG.appendChild(t);
  });
}

const GEO_URL = "https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson";

fetch(GEO_URL)
  .then(r => r.json())
  .then(drawGeo)
  .catch(err => {
    document.getElementById("loading").textContent = "Error cargando el mapa: " + err.message;
  });
</script>
</body>
</html>
